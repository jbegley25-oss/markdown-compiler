name: doctests
on:
  push:
    branches: ['*']
  workflow_dispatch:
jobs:
  tests:
    strategy:
      matrix:
        python: [3.11]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run tests
        run: |
          python -m doctest --verbose markdown_compiler/__init__.py
          python -m doctest --verbose markdown_compiler/util/line_functions.py
